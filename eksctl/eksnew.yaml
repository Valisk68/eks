apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshopeks
  region: us-east-1
  #version: "1.29"

availabilityZones: ["us-east-1a", "us-east-1b", "us-east-1c"]

managedNodeGroups:
  - name: spotst
    instanceTypes: ["c4.large", "c5.large", "c5a.large", "m5.large", "m5a.large"]
    spot: true
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    #amiFamily: AmazonLinux2