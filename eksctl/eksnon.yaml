apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eksnon
  region: us-east-1
  version: "1.32"

availabilityZones: ["us-east-1a", "us-east-1b", "us-east-1c"]

autoModeConfig:
  enabled: false

managedNodeGroups:
  - name: ng-ondemand
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    amiFamily: AmazonLinux2023